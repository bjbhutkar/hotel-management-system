# ============================================================
# Hotel Management System - Application Configuration
# ============================================================

# Disable embedded web server (desktop app)
spring.main.web-application-type=none
spring.main.banner-mode=off

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:${user.home}/hotel_management/hotel_management.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# App
app.name=Hotel Management System
app.version=1.0.0
app.database.path=${user.home}/hotel_management/hotel_management.db

# Logging
logging.level.root=WARN
logging.level.com.hotel=INFO
logging.level.org.hibernate=WARN

# ============================================================
# Delivery Platform Integration
# ============================================================

# How often to poll active platforms for new orders (milliseconds)
delivery.poll.interval-ms=30000

# Webhook server (set to true once you have a public IP / port-forwarded)
delivery.webhook.enabled=false
delivery.webhook.port=9090

# Master passphrase for AES-256 credential encryption
# CHANGE THIS to a long random string before first production use
delivery.credential.secret=RasoiPlatformSecretKey!ChangeMe2025
